name: Control Plane Audit SIEM Reconcile

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Reconcile failed/replayed/acked batches
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python scripts/reconcile_control_plane_audit.py --limit 5000
