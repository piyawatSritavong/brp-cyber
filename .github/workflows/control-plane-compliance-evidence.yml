name: control-plane-compliance-evidence

on:
  workflow_dispatch:
  schedule:
    - cron: '50 1 * * 1'

jobs:
  report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate control-plane compliance evidence
        run: python scripts/generate_control_plane_compliance_evidence.py
