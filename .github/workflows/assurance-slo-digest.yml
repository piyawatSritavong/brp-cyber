name: assurance-slo-digest

on:
  workflow_dispatch:
  schedule:
    - cron: '50 1 * * *'

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate assurance executive digest
        run: python scripts/generate_assurance_executive_digest.py
