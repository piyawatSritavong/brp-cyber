name: assurance-contract-evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: '40 0 * * *'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Evaluate assurance contracts
        run: python scripts/evaluate_assurance_contracts.py
