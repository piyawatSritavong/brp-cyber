name: assurance-evidence-package-signing

on:
  workflow_dispatch:
  schedule:
    - cron: '25 2 * * *'

jobs:
  sign_and_verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate signed evidence package
        run: python scripts/generate_signed_evidence_package.py --tenant-code acb || true
      - name: Verify signed evidence package chain
        run: python scripts/verify_signed_evidence_package.py --tenant-code acb || true
