name: control-plane-governance-attestation

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  attest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate signed governance attestation
        run: python scripts/generate_signed_governance_attestation.py --limit 5000 --export
      - name: Verify latest detached bundle
        run: |
          latest_bundle=$(ls -t ./tmp/compliance/exports/governance_attestation_bundle_*.json | head -n 1)
          python scripts/verify_governance_attestation_bundle.py --bundle "$latest_bundle"
