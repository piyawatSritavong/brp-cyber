name: s3-object-lock-validate

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Run live S3 checks"
        required: false
        default: "false"
  schedule:
    - cron: '40 1 * * 1'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate S3 Object Lock
        run: |
          if [ "${{ github.event.inputs.execute || 'false' }}" = "true" ]; then
            python scripts/validate_s3_object_lock.py --execute
          else
            python scripts/validate_s3_object_lock.py
          fi
