name: orchestration-failover-signing

on:
  workflow_dispatch:

jobs:
  failover-signing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate signed orchestration failover report
        run: python scripts/generate_signed_orchestration_failover_report.py --limit 200 || true
      - name: Verify signed orchestration failover report chain
        run: python scripts/verify_signed_orchestration_failover_report.py --limit 1000 || true
