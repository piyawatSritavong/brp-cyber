name: orchestration-rollout-handoff-policy-drift-signing

on:
  workflow_dispatch:

jobs:
  drift-signing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate signed rollout handoff policy drift report
        run: python scripts/generate_signed_rollout_handoff_policy_drift.py --limit 200 || true
      - name: Verify signed rollout handoff policy drift report chain
        run: python scripts/verify_signed_rollout_handoff_policy_drift.py --limit 1000 || true
