name: orchestration-rollout-handoff-federation-verifier-bundle

on:
  workflow_dispatch:

jobs:
  verifier-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Report federation verifier bundle
        run: python scripts/report_rollout_handoff_federation_verifier_bundle.py --limit 1000 || true
