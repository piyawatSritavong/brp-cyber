name: assurance-policy-pack-bootstrap

on:
  workflow_dispatch:
  schedule:
    - cron: '20 0 * * *'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Bootstrap assurance policy packs
        run: python scripts/bootstrap_assurance_policy_packs.py
