name: Control Plane Admin Activity Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  report:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Generate report
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python scripts/generate_admin_activity_report.py \
            --limit 1000 \
            --output ../docs/reports/control_plane_admin_activity_latest.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-admin-activity-report
          path: docs/reports/control_plane_admin_activity_latest.md
