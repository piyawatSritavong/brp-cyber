name: orchestration-pilot-rollout-policy

on:
  workflow_dispatch:

jobs:
  policy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Report rollout policy + pending approvals (sample tenant UUID)
        run: python scripts/report_pilot_rollout_policy.py --tenant-id 00000000-0000-0000-0000-000000000001 --limit 5 || true
