name: orchestration-cost-federation

on:
  workflow_dispatch:

jobs:
  cost-federation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Report orchestration cost federation + policy matrix
        run: python scripts/report_orchestration_cost_federation.py --limit 200 --min-tier high || true
