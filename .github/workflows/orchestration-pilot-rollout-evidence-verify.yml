name: orchestration-pilot-rollout-evidence-verify

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify rollout evidence chain (sample tenant UUID)
        run: python scripts/verify_pilot_rollout_evidence.py --tenant-id 00000000-0000-0000-0000-000000000001 --limit 100 || true
