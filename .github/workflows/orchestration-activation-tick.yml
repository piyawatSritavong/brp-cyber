name: orchestration-activation-tick

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  tick:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run activation scheduler tick
        run: python scripts/run_orchestration_activation_tick.py --limit 500 || true
