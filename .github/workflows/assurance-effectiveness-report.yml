name: assurance-effectiveness-report

on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * *'

jobs:
  report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate assurance effectiveness report
        run: python scripts/report_assurance_effectiveness.py
