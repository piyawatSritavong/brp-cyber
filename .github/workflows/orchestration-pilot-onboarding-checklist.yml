name: orchestration-pilot-onboarding-checklist

on:
  workflow_dispatch:

jobs:
  checklist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate checklist (sample tenant UUID)
        run: python scripts/generate_pilot_onboarding_checklist.py --tenant-id 00000000-0000-0000-0000-000000000001 || true
