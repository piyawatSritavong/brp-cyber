name: orchestration-rollout-handoff-risk

on:
  workflow_dispatch:

jobs:
  risk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Report rollout handoff risk (sample tenant UUID)
        run: python scripts/report_rollout_handoff_risk.py --tenant-id 00000000-0000-0000-0000-000000000001 --limit 20 || true
