name: orchestration-pilot-rollout-auto-adjust

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Evaluate rollout posture (sample tenant UUID)
        run: python scripts/evaluate_pilot_rollout_posture.py --tenant-id 00000000-0000-0000-0000-000000000001 --limit 5 || true
