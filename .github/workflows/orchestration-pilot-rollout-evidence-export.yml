name: orchestration-pilot-rollout-evidence-export

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Export rollout evidence bundle (sample tenant UUID)
        run: python scripts/export_pilot_rollout_evidence_bundle.py --tenant-id 00000000-0000-0000-0000-000000000001 --limit 50 || true
