name: orchestration-rollout-handoff-federation

on:
  workflow_dispatch:

jobs:
  federation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Report rollout handoff federation
        run: python scripts/report_rollout_handoff_federation.py --limit 200 || true
