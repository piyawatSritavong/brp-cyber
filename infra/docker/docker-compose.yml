name: brp-cyber

services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: brp-api
    env_file:
      - ../../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  scan-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../backend/.env
    command: ["python", "-m", "app.workers.scan_worker"]
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: brp-postgres
    environment:
      POSTGRES_DB: brp_cyber
      POSTGRES_USER: brp
      POSTGRES_PASSWORD: brp
    ports:
      - "5432:5432"
    volumes:
      - brp_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: brp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: brp-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.3
    container_name: brp-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.3
    container_name: brp-promtail
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: brp-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - brp_grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  brp_postgres_data:
  brp_grafana_data:
