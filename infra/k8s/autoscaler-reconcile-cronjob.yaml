apiVersion: batch/v1
kind: CronJob
metadata:
  name: brp-autoscaler-reconcile
  namespace: brp-cyber
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reconcile
              image: curlimages/curl:8.14.1
              args:
                - /bin/sh
                - -c
                - |
                  curl -s -X POST "http://brp-api/enterprise/autoscaler/reconcile" > /dev/null
